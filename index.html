<!doctype html>
<html>
  <body>
    <h1>The a download attribute</h1>

    <p>Click on the image to download it:</p>
    <p>
      <a
        href="http://localhost:5000/api/v1/table/k49vtd9jw7l8shvjxq581ogp/qr"
        download
      >
        Table 2
        <img
          src="http://localhost:5000/api/v1/table/k49vtd9jw7l8shvjxq581ogp/qr"
          alt="W3Schools"
        />
      </a>

      <a
        href="http://localhost:5000/api/v1/table/gq90vvc3i1v0m62gqvcleygj/qr"
        download
      >
        Table 1
        <img
          src="http://localhost:5000/api/v1/table/gq90vvc3i1v0m62gqvcleygj/qr"
          alt="W3Schools"
        />
      </a>
    </p>

    <p>
      <b>Note:</b> The download attribute is not supported in IE or Edge (prior
      version 18), or in Safari (prior version 10.1).
    </p>
  </body>
</html>
